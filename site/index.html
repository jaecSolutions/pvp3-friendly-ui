<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=fr/" />
    <title>Les Petites Voix du Plateau</title>
    <link rel="canonical" href="fr/" />
    <style>
      :root {
        --bg: #f4f6f8;
        --text: #242020;
        --accent: #13a3df;
        --accent-warm: #fc9f32;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(165deg, var(--bg) 0%, #fff 55%);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      main {
        text-align: center;
        padding: 2rem 1.5rem;
        max-width: 28rem;
      }
      p {
        margin: 0 0 1rem;
        font-size: 1.05rem;
        line-height: 1.5;
      }
      a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
        border-bottom: 2px solid color-mix(in srgb, var(--accent) 35%, transparent);
        transition: color 0.2s ease, border-color 0.2s ease;
      }
      a:hover {
        color: var(--accent-warm);
        border-bottom-color: var(--accent-warm);
      }
      .spinner {
        width: 2rem;
        height: 2rem;
        margin: 0 auto 1.25rem;
        border: 3px solid color-mix(in srgb, var(--accent) 22%, transparent);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner" aria-hidden="true"></div>
      <p>Redirection vers <a href="fr/">la page d’accueil</a>…</p>
    </main>
  </body>
</html>
